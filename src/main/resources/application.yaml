ktor:
  deployment:
    port: 8080
  application:
    modules:
      - cantstopthesignal.config.HttpKt.configureHttp
      - cantstopthesignal.config.CustomizationKt.loadSiteConfig
      - cantstopthesignal.config.SerializationKt.configureSerialization
      - cantstopthesignal.security.SecurityKt.configureSecurity
      - cantstopthesignal.security.RateLimitingKt.configureRateLimiting
      - com.freedom.ThymeleafKt.configureThymeleaf
      - cantstopthesignal.config.StatusPagesKt.configureStatusPages
      - cantstopthesignal.config.RoutingKt.configureRouting
      - cantstopthesignal.routing.login.IndexRoutingKt.indexRouting
      - com.freedom.cantstopthesignal.routing.LoginRoutingKt.configureLoginRoutes
      - cantstopthesignal.routing.login.SignUpRoutingKt.configureSignupRoutes
      - cantstopthesignal.routing.posts.PostsRoutingKt.configurePostRouting
      - cantstopthesignal.config.DatabaseKt.configureDatabase
      - cantstopthesignal.routing.profile.MyProfileRoutingKt.configureProfileRoutes
      - cantstopthesignal.routing.profile.NotificationsRoutingKt.configureNotificationRoutes




site:
