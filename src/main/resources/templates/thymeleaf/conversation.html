<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Conversation</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --surface: #181b24;
            --surface-hover: #1e2130;
            --border: #272b3a;
            --accent: #5b8af5;
            --accent-dim: #1e2d56;
            --text: #e8eaf2;
            --text-secondary: #7b82a0;
            --dm-avatar: #1e3a2f;
            --dm-pill: #1a3324;
            --dm-pill-text: #4ecb82;
            --enc-color: #f5c842;
            --danger: #e05252;
            --danger-dim: #2d1a1a;
            --danger-border: #7a2020;
            --warn: #e08c30;
            --warn-dim: #2d1e0f;
            --warn-border: #7a4a10;
            --radius: 10px;
            --font: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .alert-error {
            background: #2d1a1a;
            border: 1px solid #7a2020;
            color: #f08080;
        }

        .alert-success {
            background: #1a2d1f;
            border: 1px solid #207a40;
            color: #80d09e;
        }

        /* ── Top bar ── */
        .topbar {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            padding: 0.85rem 1.25rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .topbar a.back {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.35rem 0.75rem;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: var(--bg);
            transition: opacity .15s;
            flex-shrink: 0;
        }

        .topbar a.back:hover {
            opacity: .8;
        }

        .topbar-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--dm-avatar);
            color: #4ecb82;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .topbar-info {
            flex: 1;
            min-width: 0;
        }

        .topbar-name {
            font-weight: 700;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .topbar-members {
            font-size: 0.75rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .enc-icon {
            font-size: 0.75rem;
            color: var(--enc-color);
        }

        /* ── Topbar action buttons ── */
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        /*
         * ── Confirm-on-click pattern (pure CSS) ──
         *
         * Each .confirm-wrap contains:
         *   1. A real <a> (the confirm action) — hidden by default via the checkbox trick
         *   2. A <label> styled as the "idle" button (dummy trigger)
         *   3. A hidden <input type="checkbox"> that acts as the toggle
         *
         * When the checkbox is :checked, the idle label hides and the
         * confirm anchor appears in its place.  No JavaScript required.
         *
         * Markup order inside .confirm-wrap must be:
         *   input[type=checkbox]  →  label.idle-btn  →  a.confirm-btn
         */
        .confirm-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        /* Hide the real checkbox visually but keep it in the tab order */
        .confirm-wrap input[type="checkbox"].confirm-toggle {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
            pointer-events: none;
        }

        /* Idle (dummy) button — the label the user sees first */
        .idle-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 0.35rem 0.75rem;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-secondary);
            cursor: pointer;
            transition: border-color .15s, color .15s;
            white-space: nowrap;
            user-select: none;
        }

        .idle-btn:hover {
            border-color: var(--text-secondary);
            color: var(--text);
        }

        /* Danger variant idle button */
        .idle-btn.danger:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Warn variant idle button */
        .idle-btn.warn:hover {
            border-color: var(--warn);
            color: var(--warn);
        }

        /* Confirm button — hidden until checkbox is :checked */
        .confirm-btn {
            display: none;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.78rem;
            font-weight: 700;
            padding: 0.35rem 0.9rem;
            border-radius: 7px;
            border: 1px solid;
            text-decoration: none;
            cursor: pointer;
            white-space: nowrap;
            animation: confirm-pop .12s ease-out;
        }

        @keyframes confirm-pop {
            from {
                opacity: 0;
                transform: scale(.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Danger confirm */
        .confirm-btn.danger {
            background: var(--danger-dim);
            border-color: var(--danger-border);
            color: var(--danger);
        }

        .confirm-btn.danger:hover {
            background: #3d1f1f;
        }

        /* Warn confirm */
        .confirm-btn.warn {
            background: var(--warn-dim);
            border-color: var(--warn-border);
            color: var(--warn);
        }

        .confirm-btn.warn:hover {
            background: #3d2810;
        }

        /*
         * The magic: when the checkbox is checked,
         * hide the idle label and show the confirm anchor.
         */
        .confirm-toggle:checked ~ .idle-btn {
            display: none;
        }

        .confirm-toggle:checked ~ .confirm-btn {
            display: inline-flex;
        }

        /* ── Alerts ── */
        .alerts-wrap {
            padding: 0.75rem 1.25rem 0;
            flex-shrink: 0;
        }

        /* ── Pagination ── */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.85rem 1rem;
            border-top: 1px solid var(--border);
        }

        .page-btn {
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.35rem 0.9rem;
            border-radius: 6px;
            text-decoration: none;
            background: var(--border);
            color: var(--text);
            transition: background .15s;
        }

        .page-btn:hover:not(.disabled) {
            background: var(--surface-hover);
        }

        .page-btn.disabled {
            opacity: .35;
            pointer-events: none;
        }

        .page-info {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* ── Message list ── */
        .messages-wrap {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem;
            display: flex;
            flex-direction: column-reverse;
            gap: 0.5rem;
        }

        .date-divider {
            text-align: center;
            font-size: 0.72rem;
            color: var(--text-secondary);
            margin: 0.75rem 0 0.25rem;
            position: relative;
        }

        .date-divider::before,
        .date-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 38%;
            height: 1px;
            background: var(--border);
        }

        .date-divider::before {
            left: 0;
        }

        .date-divider::after {
            right: 0;
        }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 0.55rem;
        }

        .msg-row.me {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--dm-avatar);
            color: #4ecb82;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.65rem;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .msg-avatar.me-avatar {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .msg-avatar.spacer {
            visibility: hidden;
        }

        .msg-content {
            max-width: 65%;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .msg-row.me .msg-content {
            align-items: flex-end;
        }

        .msg-sender {
            font-size: 0.7rem;
            color: var(--text-secondary);
            padding: 0 0.25rem;
        }

        .bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 0.55rem 0.85rem;
            font-size: 0.875rem;
            line-height: 1.5;
            word-break: break-word;
            color: var(--text);
        }

        .msg-row.me .bubble {
            background: var(--accent-dim);
            border-color: #2a3f7a;
            color: #c8d8ff;
        }

        .msg-time {
            font-size: 0.68rem;
            color: var(--text-secondary);
            padding: 0 0.25rem;
        }

        /* ── Compose bar ── */
        .compose {
            display: flex;
            align-items: flex-end;
            gap: 0.65rem;
            padding: 0.85rem 1.25rem;
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .compose-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-family: var(--font);
            font-size: 0.875rem;
            padding: 0.6rem 1rem;
            resize: vertical;
            outline: none;
            height: 40px;
            min-height: 40px;
            max-height: 140px;
            transition: border-color .15s;
            line-height: 1.5;
        }

        .compose-input::placeholder {
            color: var(--text-secondary);
        }

        .compose-input:focus {
            border-color: var(--accent);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity .15s;
            text-decoration: none;
        }

        .send-btn:hover {
            opacity: .85;
        }

        .send-btn:active {
            opacity: .7;
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
            fill: #fff;
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.875rem;
            padding: 2rem 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        .page-shell {
            width: 100%;
            max-width: 50vw;
            min-width: 780px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            background: var(--bg);
            margin: 0 auto;
        }
    </style>
</head>
<body>
<div class="page-shell">

    <!-- ── Top bar ── -->
    <div class="topbar">
        <a class="back" href="/messages">← Back</a>

        <div class="topbar-info">
            <div class="topbar-name">
                <span th:text="${conversation.name != null} ? ${conversation.name} : ${conversation.lastSender}">Conversation</span>
            </div>
            <span class="topbar-members">Members:</span>
            <div class="topbar-members">
                <th:block th:each="member, iter : ${conversation.members}">
                    <a style="color: #ffffff" th:href="|/profile/name/${member}|" th:text="${member}"></a><th:block th:if="${!iter.last}">, </th:block>
                </th:block>
            </div>
            <br>
            <div class="topbar-members" th:text="${server_config.pgpHelp}"></div>
            <div class="enc-icon"
                 th:text="${conversation.transientMessages} ? 'Self Deleting Messages ON' : 'Self Deleting Messages OFF'"></div>
        </div>

        <!-- ── Danger actions ── -->
        <div class="topbar-actions">

            <!--
                Delete All My Messages
                Step 1: user sees the warn idle button
                Step 2: clicking the label checks the hidden checkbox
                Step 3: :checked CSS shows the "Are you sure?" confirm link
            -->
            <div class="confirm-wrap">
                <form method="post"
                      th:action="|/messages/conversation/${conversation.id}/deleteAll|"
                      action="/PLACEHOLDER/deleteAll">
                    <input type="checkbox" class="confirm-toggle" id="toggle-delete-msgs">
                    <label class="idle-btn warn" for="toggle-delete-msgs"
                           title="Delete all your messages in this conversation">
                        🗑 Delete My Messages
                    </label>
                    <button type="submit" class="confirm-btn warn">
                        ⚠ Are you sure?
                    </button>
                </form>
            </div>

            <!--
                Leave Conversation
            -->
            <div class="confirm-wrap">
                <form method="post"
                      th:action="|/messages/conversation/${conversation.id}/leave|"
                      action="/PLACEHOLDER/leave">
                    <input type="checkbox" class="confirm-toggle" id="toggle-leave">
                    <label class="idle-btn danger" for="toggle-leave"
                           title="Leave this conversation">
                        ✕ Leave
                    </label>
                    <button type="submit" class="confirm-btn danger">
                        ⚠ Are you sure?
                    </button>
                </form>
            </div>


        </div>
    </div>

    <!-- ── Alerts ── -->
    <div class="alerts-wrap">
        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>
        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
    </div>

    <!-- ─── Pagination ─── -->
    <div class="pagination"
         th:if="${total_pages > 1}">

        <a class="page-btn"
           th:classappend="${current_page == 1} ? 'disabled'"
           th:href="|/messages/conversations/${conversation.id}?page=${current_page - 1}|">
            &#8592; Newer
        </a>

        <span class="page-info"
              th:text="|Page ${current_page} of ${total_pages}|">
        Page 1 of 1
    </span>
        <a class="page-btn"
           th:classappend="${current_page == total_pages} ? 'disabled'"
           th:href="|/messages/conversations/${conversation.id}?page=${current_page + 1}|">
            Older &#8594;
        </a>

    </div>

    <div class="messages-wrap">

        <div class="empty-state"
             th:if="${messages == null or #lists.isEmpty(messages)}">
            No messages yet. Say hello!
        </div>

        <th:block th:each="msg, iterStat : ${messages}">

            <div class="date-divider"
                 th:if="${iterStat.first or
              !#temporals.format(msg.timeSent, 'yyyy-MM-dd').equals(
                #temporals.format(messages[iterStat.index - 1].timeSent, 'yyyy-MM-dd')
              )}"
                 th:text="${#temporals.format(msg.timeSent, 'MMMM d, yyyy')}">
                Today
            </div>

            <div class="msg-row"
                 th:classappend="${msg.isMe} ? 'me'"
                 th:style="${!iterStat.first and messages[iterStat.index - 1].sender != msg.sender} ? 'margin-top: 1rem;' : 'margin-top: 0.2rem;'">

                <div th:if="${!iterStat.first and messages[iterStat.index - 1].sender == msg.sender}"
                     class="msg-avatar spacer"></div>
                <div th:unless="${!iterStat.first and messages[iterStat.index - 1].sender == msg.sender}"
                     class="msg-avatar"
                     th:classappend="${msg.isMe} ? 'me-avatar'"
                     th:text="${(msg.sender != null) ? msg.sender.substring(0,1) : '?'}">?
                </div>

                <div class="msg-content">

                    <span class="msg-sender"
                          th:if="${!msg.isMe}"
                          th:text="${msg.sender}">Sender</span>

                    <div class="bubble"
                         th:text="${msg.message}"
                         style="white-space: pre-wrap; word-break: break-word;"></div>

                    <span class="msg-time"
                          th:text="${#temporals.format(msg.timeSent, 'HH:mm')}">12:00</span>
                </div>

            </div>

        </th:block>
    </div>

    <!-- ── Compose ── -->
    <form class="compose"
          th:action="|/messages/conversations/${conversation.id}/send|"
          method="post">
        <textarea class="compose-input"
                  name="message"
                  placeholder="Message…"
                  rows="1"
                  required></textarea>
        <button class="send-btn" type="submit" aria-label="Send">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
            </svg>
        </button>
    </form>

</div>
</body>
</html>
