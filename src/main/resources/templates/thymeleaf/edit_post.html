<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Post</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:            #0f1117;
            --surface:       #181b24;
            --surface-hover: #1e2130;
            --border:        #272b3a;
            --text-primary:  #e8eaf2;
            --text-secondary:#7b82a0;
            --accent:        #5b8af5;
            --accent-soft:   #1e2d56;
            --danger:        #e06060;
            --danger-soft:   #2d1a1a;
            --muted:         #4a5068;
            --radius:        10px;
            --shadow:        0 2px 12px rgba(0,0,0,0.25);
            --font:          'DM Sans', sans-serif;
            --font-serif:    'Lora', serif;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-primary);
            margin: 0;
            padding: 2.5rem 1rem 4rem;
            min-height: 100vh;
        }

        .container { max-width: 760px; margin: 0 auto; }

        /* ── Top bar ── */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .topbar h1 {
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin: 0;
        }

        /* ── Flash messages ── */
        .error {
            background: var(--danger-soft);
            color: var(--danger);
            border: 1px solid #7a2020;
            border-radius: var(--radius);
            padding: 0.6rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }
        .success {
            background: #1a2d1f;
            color: #4ecb82;
            border: 1px solid #207a40;
            border-radius: var(--radius);
            padding: 0.6rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .section-title {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: var(--muted);
            padding: 1rem 1.75rem 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .card-body { padding: 1.5rem 1.75rem; }

        /* ── Form ── */
        .form-group { margin-bottom: 1.25rem; }
        .form-group:last-of-type { margin-bottom: 0; }

        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
        }

        input[type="text"],
        textarea {
            width: 100%;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            padding: 0.55rem 0.75rem;
            font-size: 0.9rem;
            font-family: var(--font);
            color: var(--text-primary);
            background: var(--bg);
            transition: border-color 0.15s;
            outline: none;
        }

        textarea {
            min-height: 220px;
            resize: vertical;
            line-height: 1.6;
        }

        input[type="text"]:focus,
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(91,138,245,0.12);
        }

        .helper {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 0.35rem;
            line-height: 1.5;
        }

        /* ── Actions ── */
        .actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            padding: 1rem 1.75rem 1.25rem;
            border-top: 1px solid var(--border);
            background: var(--surface-hover);
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.42rem 0.875rem;
            border-radius: 6px;
            font-family: var(--font);
            font-size: 0.82rem;
            font-weight: 600;
            border: 1.5px solid transparent;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.15s, transform 0.1s;
            line-height: 1;
        }
        .btn:active { transform: scale(0.97); }

        .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-primary:hover { opacity: 0.88; }

        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border-color: var(--border);
        }
        .btn-secondary:hover { background: var(--surface-hover); }
    </style>
</head>
<body>
<div class="container">

    <div class="topbar">
        <h1>Create Post</h1>
        <a class="btn btn-secondary" href="/feed">Home Feed</a>
    </div>

    <div class="error"   th:if="${error}"   th:text="${error}"></div>
    <div class="success" th:if="${success}" th:text="${success}"></div>

    <div class="card">
        <div class="section-title">Edit Post</div>

        <form action="/posts/edit" method="post">
            <div class="card-body">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input id="title" type="text" name="title" minlength="4" maxlength="300"
                           placeholder="Enter a title" required>
                    <p class="helper">Keep it short and clear.</p>
                </div>

                <div class="form-group">
                    <label for="topic">Topic</label>
                    <input id="topic" type="text" name="topic" minlength="2" maxlength="100"
                           placeholder="Enter a topic" required>
                    <p class="helper">Keep it short and simple — check popular topic names to make this post easier to find.</p>
                </div>

                <div class="form-group">
                    <label for="content">Content</label>
                    <textarea id="content" name="content" minlength="5" maxlength="20000"
                              placeholder="Write your post here..." required></textarea>
                    <p class="helper">You can write a longer message, update, or thought here.</p>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" type="submit">Publish Post</button>
                <a class="btn btn-secondary" href="/feed">Cancel</a>
            </div>
        </form>
    </div>

</div>
</body>
</html>
