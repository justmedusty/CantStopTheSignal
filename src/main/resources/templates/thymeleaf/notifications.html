<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Notifications</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f0ede8;
      --surface:       #faf9f7;
      --border:        #e2ddd6;
      --text-primary:  #1c1a17;
      --text-secondary:#6b6560;
      --accent:        #2d5be3;
      --accent-soft:   #e8edfb;
      --danger:        #c93030;
      --danger-soft:   #fbeaea;
      --muted:         #8c877f;
      --radius:        10px;
      --shadow:        0 2px 12px rgba(0,0,0,0.07);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      margin: 0;
      padding: 2.5rem 1rem 4rem;
      min-height: 100vh;
    }

    .container { max-width: 760px; margin: 0 auto; }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .topbar h1 {
      font-family: 'Lora', serif;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0;
    }
    .topbar-actions { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.42rem 0.875rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      border: 1.5px solid transparent;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
      line-height: 1;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary  { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { opacity: 0.88; }

    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border-color: var(--border);
    }
    .btn-secondary:hover { background: var(--border); }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      padding: 1rem 1.75rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── Notification list ── */
    .notification-list {
      display: flex;
      flex-direction: column;
    }

    .notification-item {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.75rem;
      border-bottom: 1px solid var(--border);
    }
    .notification-item:last-child { border-bottom: none; }

    .notification-item.unread {
      background: var(--accent-soft);
      border-left: 3px solid var(--accent);
      padding-left: calc(1.75rem - 3px);
    }

    .notification-main { flex: 1; min-width: 0; }

    .notification-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.875rem;
      margin-bottom: 0.25rem;
    }

    .notification-text {
      color: var(--text-secondary);
      font-size: 0.875rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .notification-meta {
      margin-top: 0.4rem;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .notification-actions {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    /* ── New badge ── */
    .badge-new {
      background: var(--accent);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      border-radius: 999px;
      padding: 0.15rem 0.5rem;
      line-height: 1.4;
      letter-spacing: 0.04em;
    }

    /* ── Inline post link ── */
    .notif-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .notif-link:hover { text-decoration: underline; }

    /* ── Empty state ── */
    .empty-state {
      padding: 1.5rem 1.75rem;
      font-size: 0.875rem;
      color: var(--muted);
      font-style: italic;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <h1>Notifications</h1>
    <div class="topbar-actions">
      <a class="btn btn-secondary" th:href="@{feed}">← Home Feed</a>
      <a class="btn btn-primary"   th:href="@{notifications/mark-all-read}">Mark all read</a>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Recent Activity</div>

    <div class="notification-list"
         th:if="${notifications != null and !#lists.isEmpty(notifications)}">

      <div class="notification-item"
           th:each="n : ${notifications}"
           th:classappend="${!n.read} ? 'unread' : ''">

        <div class="notification-main">
          <div class="notification-title">
            <span th:text="${n.type}">Like</span>
            <span class="badge-new" th:if="${!n.read}">New</span>
          </div>
          <div class="notification-text">
            <span th:text="${n.message}">Someone liked your post.</span>
            <span th:if="${n.postTitle != null}">
                            on <a class="notif-link"
                                  th:href="@{post/{id}(id=${n.postId})}"
                                  th:text="${n.postTitle}">your post</a>
                        </span>
          </div>
          <div class="notification-meta" th:text="${n.createdAt}">just now</div>
        </div>

        <div class="notification-actions">
          <a class="btn btn-secondary"
             th:if="${!n.read}"
             th:href="@{notifications/read/{id}(id=${n.id})}">Mark read</a>
          <a class="btn btn-primary"
             th:if="${n.postId != null}"
             th:href="@{post/{id}(id=${n.postId})}">View</a>
        </div>
      </div>

    </div>

    <div class="empty-state"
         th:if="${notifications == null or #lists.isEmpty(notifications)}">
      No notifications yet.
    </div>
  </div>

</div>
</body>
</html>
