<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Welcome</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            background: #f5f7fb;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            text-align: center;
            min-width: 320px;
        }
        .buttons {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .btn {
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }
        .login {
            background: #2563eb;
            color: white;
        }
        .signup {
            background: #16a34a;
            color: white;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Can't Stop The Signal</h1>
    <p>Please log in or create an account to continue.</p>

    <div class="buttons">
        <a class="btn login" th:href="@{login}">Login</a>
        <a class="btn signup" th:href="@{signup}">Sign Up</a>
    </div>
</div>
</body>
</html>
