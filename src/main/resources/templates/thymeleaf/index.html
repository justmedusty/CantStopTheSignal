<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Welcome</title>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:           #0f1117;
            --surface:      #181b24;
            --surface-hover:#1e2130;
            --border:       #272b3a;
            --accent:       #5b8af5;
            --accent-dim:   #1e2d56;
            --text:         #e8eaf2;
            --text-secondary: #7b82a0;
            --danger:       #c93030;
            --radius:       10px;
            --shadow:       0 2px 12px rgba(0,0,0,0.25);
            --font:         'Segoe UI', system-ui, sans-serif;
            --font-serif:   'Lora', serif;
        }

        body {
            font-family: var(--font);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            padding: 2rem;
            gap: 0;
            color: var(--text);
        }

        /* ── Site Banner ── */
        .site_banner {
            max-width: 760px;
            width: 100%;
            margin: 0 auto 2rem;
            padding: 2rem 2.5rem;
            text-align: center;
            background: var(--accent-dim);
            border: 1px solid var(--accent);
            color: var(--text);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            font-family: var(--font-serif);
        }
        .site_banner h1 { margin: 0 0 0.6rem; font-size: 2rem; font-weight: 600; letter-spacing: -0.02em; line-height: 1.15; color: var(--text); }
        .site_banner h2 { margin: 0 0 0.8rem; font-size: 1.25rem; font-weight: 600; letter-spacing: -0.01em; line-height: 1.3; color: var(--text); opacity: 0.95; }
        .site_banner h3 { margin: 0; font-size: 1rem; font-weight: 400; line-height: 1.5; color: var(--text-secondary); font-family: var(--font); }

        /* ── Card ── */
        .card {
            background: var(--surface);
            padding: 2rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            text-align: center;
            min-width: 320px;
            color: var(--text);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .buttons {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 0.55rem 1.25rem;
            border-radius: 6px;
            text-decoration: none;
            font-family: var(--font);
            font-size: 0.875rem;
            font-weight: 600;
            border: 1.5px solid transparent;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }

        .login  { background: var(--accent); color: #fff; border-color: var(--accent); }
        .login:hover  { opacity: 0.88; }

        .signup { background: var(--accent-dim); color: var(--accent); border-color: #2d3f7a; }
        .signup:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    </style>
</head>
<body>

<div class="site_banner">
    <h1 th:text="${server_config.name}">Server Name</h1>
    <h2 th:text="${server_config.topic}">Server Topic</h2>
    <h3 th:text="${server_config.motd}">Message of the Day</h3>
</div>

<div class="card">
    <p>Please log in or create an account to continue.</p>
    <div class="buttons">
        <a class="btn login"  href="login">Login</a>
        <a class="btn signup" href="signup">Sign Up</a>
    </div>
</div>

</body>
</html>
