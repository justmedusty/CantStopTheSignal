<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Welcome</title>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            background: #f5f7fb;
            margin: 0;
            padding: 2rem;
        }
        .site_banner {
            max-width: 720px;
            width: 100%;
            margin: 0 0 2rem 0;
            padding: 2rem 2.5rem;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            border-radius: 16px;
            box-shadow:
                    0 10px 30px rgba(0, 0, 0, 0.25),
                    0 1px 3px rgba(0, 0, 0, 0.15);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            text-align: center;
            min-width: 320px;
        }
        .buttons {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .btn {
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }
        .login  { background: #2563eb; color: white; }
        .signup { background: #16a34a; color: white; }
    </style>
</head>
<body>

<div class="site_banner">
    <h1 th:text="${server_config.name}"></h1>
    <h2 th:text="${server_config.topic}"></h2>
    <h3 th:text="${server_config.motd}"></h3>
</div>

<div class="card">
    <p>Please log in or create an account to continue.</p>
    <div class="buttons">
        <a class="btn login"  href="login">Login</a>
        <a class="btn signup" href="signup">Sign Up</a>
    </div>
</div>

</body>
</html>
