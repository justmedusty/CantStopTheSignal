<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --surface: #181b24;
            --surface-hover: #1e2130;
            --border: #272b3a;
            --text-primary: #e8eaf2;
            --text-secondary: #7b82a0;
            --accent: #5b8af5;
            --accent-soft: #1e2d56;
            --danger: #e06060;
            --danger-soft: #2d1a1a;
            --muted: #ffffff;
            --radius: 10px;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
            --font: 'DM Sans', sans-serif;
            --font-serif: 'Lora', serif;
        }

        body {
            font-family: var(--font);
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            padding: 2rem 1rem;
            color: var(--text-primary);
        }

        .card {
            background: var(--surface);
            padding: 2rem 2.25rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 360px;
        }

        .card h1 {
            font-family: var(--font-serif);
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            text-align: center;
            color: var(--text-primary);
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.35rem;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .field-hint {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 0.3rem;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-family: var(--font);
            font-size: 0.9rem;
            color: var(--text-primary);
            background: var(--bg);
            transition: border-color 0.15s;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: var(--accent);
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.55rem 1.25rem;
            border-radius: 6px;
            font-family: var(--font);
            font-size: 0.875rem;
            font-weight: 600;
            border: 1.5px solid transparent;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.15s, transform 0.1s;
            line-height: 1;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-submit {
            width: 100%;
            margin-top: 0.5rem;
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .btn-submit:hover {
            opacity: 0.88;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border-color: var(--border);
        }

        .btn-secondary:hover {
            background: var(--surface-hover);
        }

        .card-footer {
            margin-top: 1rem;
            display: flex;
            justify-content: center;
        }

        /* ── Flash messages ── */
        .error {
            background: var(--danger-soft);
            color: var(--danger);
            border: 1px solid #7a2020;
            border-radius: var(--radius);
            padding: 0.6rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Sign Up</h1>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form action="/signup" method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" minlength="3" maxlength="40" required/>
        </div>

        <div class="form-group">
            <label for="pgp">PGP Public Key</label>
            <input type="text" id="pgp" name="pgp"/>
            <p class="field-hint">Optional — used for encrypted messaging. Ensure that the name and email attached to
                the key you use here does NOT reveal more than you intend it to.</p>
        </div>

        <div class="form-group" th:if="${server_config.inviteOnly == true}">
            <label for="invite-code">Invite Code</label>
            <input type="text" id="invite-code" name="invite-code" minlength="1" maxlength="500" required/>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" minlength="8" maxlength="75" required/>
        </div>
        <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" name="confirm-password" minlength="8" maxlength="75" required/>
        </div>
        <button class="btn btn-submit" type="submit">Sign Up</button>
    </form>

    <div class="card-footer">
        <a class="btn btn-secondary" href="/index">Back</a>
    </div>
</div>
</body>
</html>
