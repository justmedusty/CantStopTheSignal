<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            background: #f5f7fb;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            min-width: 300px;
            text-align: center;
        }
        .card h1 { margin-top: 0; }
        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 0.25rem;
            font-size: 0.9rem;
            color: #444;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            padding: 0.6rem 1.2rem;
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
            border-radius: 8px;
            padding: 0.6rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            text-align: left;
        }
        button:hover { background: #15803d; }
    </style>
</head>
<body>
<div class="card">
    <h1>Sign Up</h1>
    <div class="error" th:if="${error}" th:text="${error}"></div>
    <form action="signup" method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required />
        </div>
        <div class="form-group">
            <label for="pgp">PGP Public Key</label>
            <input type="text" id="pgp" name="pgp"/>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required />
        </div>
        <button type="submit">Sign Up</button>
    </form>
    <br>
    <a href="index" class="btn btn-secondary">Back</a>
</div>
</body>
</html>
