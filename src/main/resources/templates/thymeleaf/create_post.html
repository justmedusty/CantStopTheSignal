<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Post</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .topbar h1 { margin: 0; }
        .card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            margin-bottom: 1.5rem;
        }
        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #94a3b8;
            margin-bottom: 1rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 0.45rem;
        }
        input[type="text"],
        textarea {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 0.8rem 0.9rem;
            font-size: 0.95rem;
            font-family: Arial, sans-serif;
            color: #1e293b;
            background: white;
        }
        textarea {
            min-height: 220px;
            resize: vertical;
            line-height: 1.5;
        }
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
        }
        .actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 1.25rem;
        }
        .btn {
            padding: 0.5rem 0.875rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-secondary { background: #64748b; color: white; }
        .btn-secondary:hover { background: #475569; }
        .helper {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 0.35rem;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="topbar">
        <h1>Create Post</h1>
        <a class="btn btn-secondary" th:href="@{../feed}">← Home Feed</a>
    </div>

    <div class="card">
        <div class="section-title">New post</div>

        <form th:action="@{create}" method="post">
            <div class="form-group">
                <label for="title">Title</label>
                <input id="title" type="text" name="title" maxlength="120" placeholder="Enter a title" required>
                <div class="helper">Keep it short and clear.</div>
            </div>
            <div class="form-group">
                <label for="title">Title</label>
                <input id="topic" type="text" name="topic" maxlength="120" placeholder="Enter a topic" required>
                <div class="helper">Keep it short and simple, check what popular topic names are to make finding this post easier.</div>
            </div>

            <div class="form-group">
                <label for="content">Content</label>
                <textarea id="content" name="content" placeholder="Write your post here..." required></textarea>
                <div class="helper">You can write a longer message, update, or thought here.</div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" type="submit">Publish Post</button>
                <a class="btn btn-secondary" th:href="@{../feed}">Cancel</a>
            </div>
        </form>
    </div>

</div>
</body>
</html>
