<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Messages</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --surface: #181b24;
            --surface-hover: #1e2130;
            --border: #272b3a;
            --accent: #5b8af5;
            --accent-dim: #1e2d56;
            --text: #e8eaf2;
            --text-secondary: #7b82a0;
            --dm-avatar: #1e3a2f;
            --dm-pill: #1a3324;
            --dm-pill-text: #4ecb82;
            --enc-color: #f5c842;
            --radius: 10px;
            --font: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
        }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        .alert-error {
            background: #2d1a1a;
            border: 1px solid #7a2020;
            color: #f08080;
        }

        .alert-success {
            background: #1a2d1f;
            border: 1px solid #207a40;
            color: #80d09e;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }

        .topbar h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .topbar-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.45rem 1rem;
            border-radius: 7px;
            font-size: 0.82rem;
            font-weight: 600;
            text-decoration: none;
            transition: opacity .15s;
        }

        .btn:hover {
            opacity: .85;
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }

        .conv-row {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            padding: 0.9rem 1.1rem;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid var(--border);
            transition: background .15s;
        }

        .conv-row:last-child {
            border-bottom: none;
        }

        .conv-row:hover {
            background: var(--surface-hover);
        }

        .conv-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
            text-transform: uppercase;
            background: var(--dm-avatar);
            color: #4ecb82;
            line-height: 1;
            text-align: center;
        }

        .conv-body {
            flex: 1;
            min-width: 0;
        }

        .conv-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }

        .conv-name {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            color: var(--text);
        }

        .enc-icon {
            font-size: 0.75rem;
            color: var(--enc-color);
        }

        .conv-time {
            font-size: 0.72rem;
            color: var(--text-secondary);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .conv-members {
            font-size: 0.78rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-indicators {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.35rem;
            flex-shrink: 0;
        }

        .type-pill {
            font-size: 0.68rem;
            font-weight: 700;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            background: var(--dm-pill);
            color: var(--dm-pill-text);
        }

        .me-badge {
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--text-secondary);
            font-style: italic;
        }

        .empty-state {
            padding: 2.5rem 1rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.85rem 1rem;
            border-top: 1px solid var(--border);
        }

        .page-btn {
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.35rem 0.9rem;
            border-radius: 6px;
            text-decoration: none;
            background: var(--border);
            color: var(--text);
            transition: background .15s;
        }

        .page-btn:hover:not(.disabled) {
            background: var(--surface-hover);
        }

        .page-btn.disabled {
            opacity: .35;
            pointer-events: none;
        }

        .page-info {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .unread-badge {
            font-size: 0.72rem;
            font-weight: 700;
            min-width: 20px;
            height: 20px;
            padding: 0 5px;
            border-radius: 20px;
            background: var(--accent);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 8px 2px rgba(91, 138, 245, 0.55);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 6px 1px rgba(91, 138, 245, 0.45);
            }
            50% {
                box-shadow: 0 0 14px 4px rgba(91, 138, 245, 0.75);
            }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>
    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

    <div class="topbar">
        <h1>Messages</h1>
        <div class="topbar-actions">
            <a class="btn btn-secondary" href="/feed">← Home</a>
            <a class="btn btn-primary" href="/messages/conversation/create">+ New</a>
        </div>
    </div>

    <div class="card">

        <th:block th:if="${message_conversations != null and not #lists.isEmpty(message_conversations)}">
            <!--
                th:each iterates over MessageConversationObject instances.
                The avatar initials are derived from the lastSender name.
                The lock icon appears when pgpKey is present and non-empty.
                Clicking the row navigates to /messages/conversations/{id}.
            -->
            <a class="conv-row"
               th:each="convo : ${message_conversations}"
               th:href="|/messages/conversations/${convo.id}|">

                <div class="conv-avatar"
                     th:text="${convo.lastSender != null} ?
               (${#strings.length(convo.lastSender) > 1} ?
                ${#strings.substring(convo.lastSender, 0, 1)} :
                ${convo.lastSender}) :
               'Empty'">
                    ?
                </div>

                <div class="conv-body">

                    <div class="conv-header">
                        <span class="conv-name">
                             <div class="conv-name"
                                  th:text="${convo.name}">
                        Name
                    </div>

                            <span class="enc-icon"
                                  title="PGP-Keys-Available">Always Encrypt With Member Keys🔒</span>
                        </span>
                        <span class="conv-time"
                              th:text="${#temporals.format(convo.timeOfLastMessage, 'MMM d, HH:mm')}">
                            now
                        </span>
                    </div>

                    <div class="conv-members">
                        <span th:text="'Last sender: ' + ${convo.lastSender}">Sender</span>
                    </div>

                    <!-- Members list, excluding the current user if isMe is true -->
                    <div class="conv-members"
                         th:text="'Members: ' + ${#strings.listJoin(convo.members, ', ') + ', you'}">
                        Members
                    </div>

                </div>

                <div class="conv-indicators">
                    <span class="type-pill">DM</span>
                    <span class="me-badge" th:if="${convo.isMe}">You sent last message</span>
                    <!-- Unread badge — only shown when numUnreadMessages > 0 -->
                    <span class="unread-badge"
                          th:if="${convo.numUnreadMessages != null and convo.numUnreadMessages > 0}"
                          th:text="${convo.numUnreadMessages}">
                    </span>
                </div>

            </a>
        </th:block>

        <div class="empty-state"
             th:if="${message_conversations == null or #lists.isEmpty(message_conversations)}">
            No conversations yet.
        </div>

        <!-- ─── Pagination ─── -->
        <div class="pagination"
             th:if="${total_pages > 0}">

            <a class="page-btn"
               th:classappend="${current_page == 1} ? 'disabled'"
               th:href="|/messages?page=${current_page - 1}|">
                &#8592; Prev
            </a>

            <span class="page-info"
                  th:text="|Page ${current_page} of ${total_pages}|">
        Page 1 of 1
    </span>

            <a class="page-btn"
               th:classappend="${current_page == total_pages} ? 'disabled'"
               th:href="|/messages?page=${current_page + 1}|">
                Next &#8594;
            </a>

        </div>

    </div><!-- /card -->

</div><!-- /container -->
</body>
</html>
