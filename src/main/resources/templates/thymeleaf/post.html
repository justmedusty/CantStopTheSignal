<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Posts</title>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --surface: #181b24;
            --surface-hover: #1e2130;
            --border: #272b3a;
            --text-primary: #e8eaf2;
            --text-secondary: #ffffff;
            --accent: #5b8af5;
            --accent-soft: #1e2d56;
            --danger: #e06060;
            --danger-soft: #2d1a1a;
            --muted: #ffffff;
            --radius: 10px;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
            --font: 'DM Sans', sans-serif;
            --font-serif: 'Lora', serif;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-primary);
            padding: 2.5rem 1rem 4rem;
            min-height: 100vh;
        }

        .container {
            max-width: 50vw;
            min-width: 480px;
            margin: 0 auto;
        }

        h1 {
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        /* ── Post Card ── */
        .post-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .post-body {
            padding: 1.5rem 1.75rem 1.25rem;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .post-title {
            font-family: var(--font-serif);
            font-size: 1.35rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .post-topic {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            background: var(--accent-soft);
            color: var(--accent);
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            white-space: nowrap;
        }

        .post-meta {
            font-size: 0.82rem;
            color: var(--muted);
            margin-bottom: 1rem;
        }

        .post-meta span {
            font-weight: 600;
            color: var(--text-secondary);
        }

        .post-content {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-secondary);
            margin-bottom: 1.25rem;
            overflow-wrap: break-word;
            word-break: break-word;
            min-width: 0;
        }

        .post-edited {
            font-size: 0.78rem;
            color: var(--muted);
            font-style: italic;
            margin-bottom: 0.75rem;
        }

        /* ── Reaction Bar ── */
        .reaction-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.75rem;
            border-top: 1px solid var(--border);
            background: var(--surface-hover);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.42rem 0.875rem;
            border-radius: 6px;
            font-family: var(--font);
            font-size: 0.82rem;
            font-weight: 600;
            border: 1.5px solid transparent;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.15s, transform 0.1s;
            line-height: 1;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-like {
            background: var(--accent-soft);
            color: var(--accent);
            border-color: #2d3f7a;
        }

        .btn-like.active, .btn-like:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .btn-dislike {
            background: var(--danger-soft);
            color: var(--danger);
            border-color: #7a2020;
        }

        .btn-dislike.active, .btn-dislike:hover {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
        }

        .btn-muted {
            background: transparent;
            color: var(--text-secondary);
            border-color: var(--border);
        }

        .btn-muted:hover {
            background: var(--surface-hover);
        }

        .btn-danger-outline {
            background: transparent;
            color: var(--danger);
            border-color: #7a2020;
        }

        .btn-danger-outline:hover {
            background: var(--danger-soft);
        }

        .reaction-spacer {
            flex: 1;
        }

        /* ── Comments Section ── */
        .comments-section {
            border-top: 1px solid var(--border);
            max-width: 50vw;
            min-width: 480px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .comments-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.75rem 0.75rem;
        }

        .comments-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
        }

        .comment-count-badge {
            font-size: 0.78rem;
            font-weight: 600;
            background: var(--surface-hover);
            color: var(--text-secondary);
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
        }

        .comment-list {
            padding: 0 1.75rem;
        }

        .comment-item {
            padding: 0.875rem 0;
            border-top: 1px solid var(--border);
        }

        .comment-item:first-child {
            border-top: none;
        }

        .comment-top {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.35rem;
            flex-wrap: wrap;
        }

        .comment-author {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .comment-author.me::after {
            content: 'you';
            display: inline-block;
            margin-left: 0.35rem;
            font-size: 0.68rem;
            font-weight: 600;
            background: #1a2d1f;
            color: #4ecb82;
            padding: 0.1rem 0.4rem;
            border-radius: 20px;
            vertical-align: middle;
        }

        .comment-time {
            font-size: 0.77rem;
            color: var(--muted);
        }

        .comment-edited {
            font-size: 0.72rem;
            color: var(--muted);
            font-style: italic;
        }

        .comment-content {
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .comment-actions {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .btn-tiny {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.28rem 0.6rem;
            border-radius: 5px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid transparent;
            cursor: pointer;
            text-decoration: none;
            font-family: var(--font);
            transition: opacity 0.15s;
            background: transparent;
            color: var(--muted);
            border-color: var(--border);
        }

        .btn-tiny:hover {
            background: var(--surface-hover);
            color: var(--text-secondary);
        }

        .btn-tiny.liked {
            color: var(--accent);
            background: var(--accent-soft);
            border-color: #2d3f7a;
        }

        .btn-tiny.disliked {
            color: var(--danger);
            background: var(--danger-soft);
            border-color: #7a2020;
        }

        .btn-replies {
            font-size: 0.77rem;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-soft);
            border-color: #2d3f7a;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.28rem 0.65rem;
            border-radius: 5px;
            border: 1px solid #2d3f7a;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .btn-replies:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .btn-blue {
            font-size: 0.77rem;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-soft);
            border-color: #2d3f7a;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.28rem 0.65rem;
            border-radius: 5px;
            border: 1px solid #2d3f7a;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .btn-blue:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* ── Pagination ── */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 1.75rem 1.25rem;
            border-top: 1px solid var(--border);
        }

        .page-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.42rem 0.875rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            font-family: var(--font);
            transition: background 0.15s;
        }

        .page-btn:hover:not(.disabled) {
            background: var(--surface-hover);
        }

        .page-btn.disabled {
            opacity: 0.38;
            pointer-events: none;
        }

        .page-info {
            font-size: 0.8rem;
            color: var(--muted);
            padding: 0 0.25rem;
        }

        /* ── Empty / No-posts ── */
        .empty-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2.5rem 2rem;
            text-align: center;
        }

        .empty-card p {
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            padding: 0.55rem 1.25rem;
            font-size: 0.875rem;
        }

        .btn-primary:hover {
            opacity: 0.88;
        }

        /* ─── Compose Box ─── */
        .compose-box {
            max-width: 680px;
            margin: 0 auto 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .compose-box form {
            display: flex;
            flex-direction: column;
        }

        .compose-box textarea {
            width: 100%;
            min-height: 120px;
            resize: vertical;
            border: none;
            outline: none;
            padding: 14px 16px;
            font-size: 14px;
            font-family: var(--font);
            line-height: 1.6;
            background: var(--surface);
            color: var(--text-primary);
            box-sizing: border-box;
        }

        .compose-box textarea::placeholder {
            color: var(--muted);
        }

        .compose-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-top: 1px solid var(--border);
            background: var(--surface-hover);
        }

        .char-count {
            font-size: 12px;
            color: var(--muted);
        }

        .compose-footer button[type="submit"] {
            padding: 5px 18px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--accent);
            color: #fff;
            cursor: pointer;
        }

        .compose-footer button[type="submit"]:hover {
            opacity: 0.88;
        }

        /* ── Top bar ── */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .topbar h1 {
            margin: 0;
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .topbar-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        /* ── Icon buttons ── */
        .btn-icon {
            position: relative;
            background: var(--surface-hover);
            color: var(--text-primary);
            padding: 0.42rem 0.7rem;
            border-radius: 6px;
            font-size: 1.1rem;
            border: 1.5px solid var(--border);
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: background 0.15s;
        }

        .btn-icon:hover {
            background: var(--border);
        }

        .btn-icon.has-alert {
            box-shadow: 0 0 0 2px var(--danger), 0 0 8px 2px rgba(224, 96, 96, 0.4);
            animation: glow-pulse 1.5s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% {
                box-shadow: 0 0 0 2px var(--danger), 0 0 8px 2px rgba(224, 96, 96, 0.35);
            }
            50% {
                box-shadow: 0 0 0 2px var(--danger), 0 0 16px 6px rgba(224, 96, 96, 0.6);
            }
        }

        .badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--danger);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            border-radius: 999px;
            padding: 1px 5px;
            min-width: 16px;
            text-align: center;
            line-height: 1.4;
        }

        /* ── Flash messages ── */
        .error {
            background: var(--danger-soft);
            color: var(--danger);
            border: 1px solid #7a2020;
            border-radius: var(--radius);
            padding: 0.6rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        .success {
            background: #1a2d1f;
            color: #4ecb82;
            border: 1px solid #207a40;
            border-radius: var(--radius);
            padding: 0.6rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        /* ── Reply toggle ── */
        .reply-toggle {
            display: none;
        }

        .reply-box {
            display: none;
        }

        .reply-toggle:checked ~ .reply-box {
            display: block;
        }

        .reply-toggle:checked ~ label.reply-btn {
            display: none;
        }

        /* ── Reply Box ── */
        .reply-box {
            width: 100%;
            flex-basis: 100%;
            margin-top: 0.85rem;
            background: #12151f;
            border: 1.5px solid var(--accent);
            border-radius: var(--radius);
            padding: 1rem 1.25rem;
            box-shadow: 0 0 0 3px rgba(91, 138, 245, 0.08);
        }

        .reply-box textarea {
            width: 100%;
            min-height: 130px;
            resize: vertical;
            background: var(--bg);
            color: var(--text-primary);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-family: var(--font);
            font-size: 0.92rem;
            line-height: 1.65;
            outline: none;
            display: block;
            box-sizing: border-box;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .reply-box textarea::placeholder {
            color: var(--muted);
        }

        .reply-box textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(91, 138, 245, 0.15);
        }

        .reply-box-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.6rem;
        }

        .reply-box-actions .btn-replies,
        .reply-box-actions .btn-blue {
            padding: 0.48rem 1rem;
            font-size: 0.82rem;
        }

        .reply-box-actions .btn-tiny {
            padding: 0.45rem 0.85rem;
            font-size: 0.8rem;
        }
        a {
            color: #ffffff;
            text-decoration: underline;
        }

    </style>
</head>
<body>
<div class="container">
    <div class="topbar">
        <h1>Posts</h1>
        <div class="topbar-actions">



            <a class="btn-icon"
               href="/notifications"
               th:classappend="${notification_count > 0} ? 'has-alert' : ''">
                🔔
                <span class="badge" th:if="${notification_count > 0}" th:text="${notification_count}"></span>
            </a>

            <a class="btn-icon"
               href="/messages"
               th:classappend="${unread_message_count > 0} ? 'has-alert' : ''">
                ✉️
                <span class="badge" th:if="${unread_message_count > 0}" th:text="${unread_message_count}"></span>
            </a>
            <a class="btn btn-primary" href="/feed">Home Feed</a>
            <a class="btn btn-primary" href="/profile">My Profile</a>
            <a class="btn btn-primary" href="/posts/create">Create Post</a>
            <a class="btn btn-primary" href="/logout">Logout</a>
        </div>
    </div>
    <div class="error" th:if="${error}" th:text="${error}"></div>
    <div class="success" th:if="${success}" th:text="${success}"></div>


    <!-- ═══════════════════════════════════════════
         Post loop
    ═══════════════════════════════════════════ -->
    <div class="post-card" th:each="post : ${posts}">

        <!-- Post Body -->
        <div class="post-body">
            <div class="post-header">
                <h2 class="post-title" th:text="${post.title}">Post Title</h2>
                <span class="post-topic" th:text="${post.topic}">Topic</span>
            </div>

            <p class="post-meta">
                by <a th:href="|/profile/${post.posterId}|" th:text="${post.posterUserName}">username</a>
                &nbsp;·&nbsp;
                <span th:text="|Posted: ${#temporals.format(post.timeStamp, 'MMMM d yyyy HH:mm')}UTC|">timestamp</span>
            </p>

            <div class="post-content" th:text="${post.content}">Post content goes here.</div>

            <p class="post-edited"
               th:if="${post.lastEdited != null and post.lastEdited != 'null'}"
               th:text="|Edited ${post.lastEdited}|">No Edits</p>
        </div>

        <!-- Reaction Bar -->
        <div class="reaction-bar">
            <!-- Like -->
            <form th:action="|/posts/like/${post.id}|" method="post">
                <button type="submit"
                        class="btn btn-like"
                        th:classappend="${post.likedByMe} ? 'active'">
                    &#9650; <span th:text="${post.likeCount}">0</span>
                </button>
            </form>

            <!-- Dislike -->
            <form th:action="|/posts/dislike/${post.id}|" method="post">
                <button type="submit"
                        class="btn btn-dislike"
                        th:classappend="${post.dislikedByMe} ? 'active'">
                    &#9660; <span th:text="${post.dislikeCount}">0</span>
                </button>
            </form>

            <div class="reaction-spacer"></div>

            <!-- Edit / Delete (only for post owner) -->
            <th:block th:if="${post.myPost}">
                <a class="btn btn-muted" th:href="|/posts/${id}/edit(id=${post.id})|">Edit</a>
                <a class="btn btn-danger-outline" th:href="|posts/@{id}/delete(id=${post.id})|">Delete</a>
            </th:block>
        </div>

        <!-- ─── Comments Section ─── -->
        <div class="comments-section">

            <div class="comments-header">
                <span class="comments-title">Comments</span>
                <span class="comment-count-badge" th:text="${post.commentCount}">0</span>
            </div>

            <!-- ─── Compose Box ─── -->
            <div class="compose-box">
                <form th:action="|/comments/post/${id}(id=${post.id}|" method="post">
                    <input type="hidden" name="postId" th:value="${post.id}"/>

                    <textarea name="content"
                              id="comment-input"
                              maxlength="5000"
                              minlength="1"
                              placeholder="Write a comment…"
                              required></textarea>

                    <div class="compose-footer">
                        <button type="submit" id="post-btn">Post</button>
                    </div>
                </form>
            </div>

            <div class="comment-list"
                 th:with="postComments=${commentsByPost != null ? commentsByPost[post.id] : null}">

                <th:block th:if="${comments != null and not #lists.isEmpty(comments)}">

                    <div class="comment-item"
                         th:each="comment : ${comments}"
                         th:if="${not comment.isReply}">

                        <!-- Comment header -->
                        <div class="comment-top">
                <span class="comment-author"
                      th:classappend="${comment.myComment} ? 'me'">
                            <a th:href="|/profile/${comment.commenterId}|" th:text="${comment.commenterUsername}">username</a>
                              <span class="comment-time"
                                    th:text="|Posted: ${#temporals.format(comment.timeStamp, 'MMMM d yyyy HH:mm')}UTC|">timestamp</span>
                            <span class="comment-edited"
                                  th:if="${comment.lastEdited != null and comment.lastEdited != 'null'}"
                                  th:text="| edited ${comment.lastEdited}|">· edited …</span>
                    </span>
                        </div>

                        <!-- Comment text -->
                        <p class="comment-content" th:text="${comment.content}">Comment text.</p>

                        <!-- Checkbox OUTSIDE comment-actions so it's a sibling of reply-box -->
                        <input type="checkbox"
                               class="reply-toggle"
                               th:id="'reply-toggle-' + ${comment.id}"
                               style="display: none;"/>

                        <!-- Comment actions -->
                        <div class="comment-actions">

                            <!-- Like -->
                            <form th:action="|/comments/${post.id}/like/${comment.id}|" method="post">
                                <button type="submit"
                                        class="btn btn-like"
                                        th:classappend="${comment.isCommentLikedByMe} ? 'active'">
                                    &#9650; <span th:text="${comment.commentLikes}">0</span>
                                </button>
                            </form>

                            <!-- Dislike -->
                            <form th:action="|/comments/${post.id}/dislike/${comment.id}|" method="post">
                                <button type="submit"
                                        class="btn btn-dislike"
                                        th:classappend="${comment.isCommentDislikedByMe} ? 'active'">
                                    &#9660; <span th:text="${comment.commentDislikes}">0</span>
                                </button>
                            </form>

                            <!-- View Replies (only when replies exist) -->
                            <a th:if="${comment.hasReplies}"
                               class="btn-replies"
                               th:href="|/comments/${post.id}/replies/${comment.id}|">&#8618; Replies</a>

                            <!-- Reply label stays here with the other buttons -->
                            <label class="btn-blue"
                                   th:for="'reply-toggle-' + ${comment.id}">Reply</label>

                            <!-- Edit / Delete (only for comment owner) -->
                            <th:block th:if="${comment.myComment}">
                                <a class="btn-tiny"
                                   th:href="|/comments/${id}/edit/${comment.id}|">Edit</a>
                                <a class="btn-tiny"
                                   style="color: var(--danger); border-color: #f3c6c6;"
                                   th:href="|/comments/${id}/delete/${comment.id}|">Delete</a>
                            </th:block>

                        </div>

                        <input type="checkbox" class="reply-toggle" th:id="'reply-toggle-' + ${comment.id}">

                        <div class="reply-box" th:id="'reply-box-' + ${comment.id}">
                            <form th:action="|/comments/${comment.id}/reply|" method="post">
                                <input type="hidden" name="parentCommentId" th:value="${comment.id}"/>
                                <input type="hidden" name="postId" th:value="${posts.id}">
                                <textarea minlength="1" maxlength="10000" name="content" rows="5"
                                          placeholder="Share your thoughts…"></textarea>
                                <div class="reply-box-actions">
                                    <button type="submit" class="btn-replies">Post Reply</button>
                                    <label class="btn-tiny" th:for="'reply-toggle-' + ${comment.id}">Cancel</label>
                                </div>
                            </form>
                        </div>

                    </div>

                </th:block>


            </div><!-- /comment-list -->

            <!-- ─── Pagination ─── -->
            <div class="pagination"
                 th:if="${total_pages > 0}">

                <a class="page-btn"
                   th:classappend="${current_page == 1} ? 'disabled'"
                   th:href="|/posts/${posts.id}?page=${current_page - 1}|">
                    &#8592; Prev
                </a>

                <span class="page-info"
                      th:text="|Page ${current_page} of ${total_pages}|">
        Page 1 of 1
    </span>

                <a class="page-btn"
                   th:classappend="${current_page == total_pages} ? 'disabled'"
                   th:href="|/posts/${post.id}?page=${current_page + 1}|">
                    Next &#8594;
                </a>

            </div>

        </div><!-- /comments-section -->

    </div><!-- /post-card -->


</div><!-- /container -->
</body>
</html>
